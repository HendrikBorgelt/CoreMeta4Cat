id: hdl:21.11165/4cat/32x1-99x6
title:
- 'Support Engineering with Phosphorus: Tuning the Palladium-Catalyzed Selective Hydrogenation of α,β-Unsaturated
  Aldehydes'
description:
- Catalyst characterization (BET, ICP-AES, PXRD, DRIFT, IR) and catalytic testing data for a series of
  Pd/P catalysts (nominal 2 wt% Pd, 0-5 wt% P) on Al2O3 and SiO2 supports, investigating how phosphorus
  modification of the support tunes the Pd-catalyzed selective hydrogenation of cinnamyl alcohol (CAL)
  and citral. Catalytic performance was screened via Central Composite Design (Al2O3/CAL, 27 runs) and
  full-factorial designs (SiO2/CAL, Al2O3/citral, SiO2/citral; 9 runs each) varying temperature (30-70
  C), pressure (1-9 bar), phosphorus loading, and reaction time. TEM is mentioned in the original repository
  description but no TEM data files are included in the deposited dataset.
