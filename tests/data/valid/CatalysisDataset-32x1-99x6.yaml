- id: coremeta4cat:REAC_32x1-99x6_CAL_Al2O3
  reaction_name:
  - selective hydrogenation of cinnamyl alcohol
  title:
  - Selective hydrogenation of cinnamyl alcohol over Pd-P/Al2O3 catalysts
  description:
  - Selective hydrogenation of cinnamyl alcohol (CAL) over 6 Pd/P/Al2O3 catalysts (P loading 0-5 wt%,
    ~2 wt% Pd) in a Central Composite Design (27 runs) exploring temperature, pressure, phosphorus loading,
    and time. An initial fixed-condition screening (50C/5bar/30min, hot-filtration leaching test) gave
    CAL conversion/HCAL yield of 32/30% (Pd/Al2O3) and 45/42% (Pd/3P/Al2O3). Conversion ranged 6-96%,
    yield 6-90% across the 27-run design (catalytic_data.xlsx, 'Pd-XPAl2O3_CCD_CAL').
  rdf_type:
